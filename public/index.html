<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mr. Robot - Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            background: white;
            padding: 20px 30px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        h1 {
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #666;
            font-size: 0.9em;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .stat-value {
            font-size: 3em;
            font-weight: bold;
            color: #667eea;
            margin: 10px 0;
        }

        .stat-label {
            color: #666;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .panel h2 {
            color: #667eea;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }

        .chat-panel {
            grid-column: 1 / -1;
        }

        .chat-messages {
            height: 400px;
            overflow-y: auto;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            background: #f9f9f9;
        }

        .message {
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 8px;
        }

        .message.user {
            background: #e3f2fd;
            margin-left: 50px;
        }

        .message.assistant {
            background: #f5f5f5;
            margin-right: 50px;
        }

        .message-role {
            font-weight: bold;
            margin-bottom: 5px;
            color: #667eea;
        }

        .chat-input-container {
            display: flex;
            gap: 10px;
        }

        input[type="text"], select {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
        }

        button {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            transition: background 0.3s;
        }

        button:hover {
            background: #5568d3;
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .list-item {
            padding: 10px;
            border-bottom: 1px solid #f0f0f0;
        }

        .list-item:last-child {
            border-bottom: none;
        }

        .skill-name {
            font-weight: bold;
            color: #667eea;
        }

        .skill-desc {
            color: #666;
            font-size: 0.9em;
            margin-top: 5px;
        }

        .pref-key {
            font-weight: bold;
            color: #667eea;
        }

        .pref-value {
            color: #666;
            font-size: 0.9em;
        }

        .scrollable-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }

        .export-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 Mr. Robot Dashboard</h1>
            <p class="subtitle">Personal AI Assistant - Control Panel</p>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Skills</div>
                <div class="stat-value" id="stat-skills">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Preferences</div>
                <div class="stat-value" id="stat-prefs">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Messages</div>
                <div class="stat-value" id="stat-messages">0</div>
            </div>
        </div>

        <div class="main-content">
            <div class="panel chat-panel">
                <h2>Chat Interface</h2>
                <div class="chat-messages" id="chatMessages">
                    <div class="loading">Start a conversation...</div>
                </div>
                <div class="chat-input-container">
                    <input type="text" id="chatInput" placeholder="Type your message...">
                    <button id="sendBtn" onclick="sendMessage()">Send</button>
                </div>
                <div class="export-buttons">
                    <button onclick="exportConversation()">📥 Export</button>
                    <input type="file" id="importFile" style="display:none" accept=".json" onchange="importConversation()">
                    <button onclick="document.getElementById('importFile').click()">📤 Import</button>
                </div>
            </div>

            <div class="panel">
                <h2>Skills</h2>
                <div class="scrollable-list" id="skillsList">
                    <div class="loading">Loading skills...</div>
                </div>
            </div>

            <div class="panel">
                <h2>Preferences</h2>
                <div class="scrollable-list" id="prefsList">
                    <div class="loading">Loading preferences...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3002/api';
        let currentSessionId = 'web-' + Date.now();

        // Load stats
        async function loadStats() {
            try {
                const response = await fetch(`${API_URL}/stats`);
                const data = await response.json();
                document.getElementById('stat-skills').textContent = data.skillCount;
                document.getElementById('stat-prefs').textContent = data.preferenceCount;
                document.getElementById('stat-messages').textContent = data.messageCount;
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }

        // Load skills
        async function loadSkills() {
            try {
                const response = await fetch(`${API_URL}/skills`);
                const data = await response.json();
                const container = document.getElementById('skillsList');

                if (data.skills.length === 0) {
                    container.innerHTML = '<div class="loading">No skills yet</div>';
                    return;
                }

                container.innerHTML = data.skills.map(skill => `
                    <div class="list-item">
                        <div class="skill-name">${skill.name}</div>
                        <div class="skill-desc">${skill.description}</div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error loading skills:', error);
                document.getElementById('skillsList').innerHTML = '<div class="loading">Error loading skills</div>';
            }
        }

        // Load preferences
        async function loadPreferences() {
            try {
                const response = await fetch(`${API_URL}/preferences`);
                const data = await response.json();
                const container = document.getElementById('prefsList');

                if (data.preferences.length === 0) {
                    container.innerHTML = '<div class="loading">No preferences yet</div>';
                    return;
                }

                container.innerHTML = data.preferences.map(pref => `
                    <div class="list-item">
                        <div class="pref-key">${pref.key}</div>
                        <div class="pref-value">${pref.value}</div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error loading preferences:', error);
                document.getElementById('prefsList').innerHTML = '<div class="loading">Error loading preferences</div>';
            }
        }

        // Send chat message
        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();

            if (!message) return;

            const messagesContainer = document.getElementById('chatMessages');
            const sendBtn = document.getElementById('sendBtn');

            // Disable input while processing
            input.disabled = true;
            sendBtn.disabled = true;

            // Add user message to UI
            messagesContainer.innerHTML += `
                <div class="message user">
                    <div class="message-role">You</div>
                    <div>${escapeHtml(message)}</div>
                </div>
            `;
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
            input.value = '';

            try {
                const response = await fetch(`${API_URL}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message, sessionId: currentSessionId })
                });
                const data = await response.json();

                // Add assistant response to UI
                messagesContainer.innerHTML += `
                    <div class="message assistant">
                        <div class="message-role">Mr. Robot</div>
                        <div>${escapeHtml(data.response)}</div>
                    </div>
                `;
                messagesContainer.scrollTop = messagesContainer.scrollHeight;

                // Reload stats
                loadStats();
            } catch (error) {
                console.error('Error sending message:', error);
                messagesContainer.innerHTML += `
                    <div class="message assistant">
                        <div class="message-role">Error</div>
                        <div>Failed to send message. Is the API server running?</div>
                    </div>
                `;
            } finally {
                input.disabled = false;
                sendBtn.disabled = false;
                input.focus();
            }
        }

        // Export conversation
        async function exportConversation() {
            try {
                const response = await fetch(`${API_URL}/export`);
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `mr-robot-export-${Date.now()}.json`;
                a.click();
                window.URL.revokeObjectURL(url);
            } catch (error) {
                console.error('Error exporting:', error);
                alert('Export failed');
            }
        }

        // Import conversation
        async function importConversation() {
            const fileInput = document.getElementById('importFile');
            const file = fileInput.files[0];

            if (!file) return;

            try {
                const text = await file.text();
                const response = await fetch(`${API_URL}/import`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ data: text, mergeMode: true })
                });
                const result = await response.json();

                alert(`Imported ${result.imported} items successfully`);
                loadStats();
                loadSkills();
                loadPreferences();
            } catch (error) {
                console.error('Error importing:', error);
                alert('Import failed');
            }
        }

        // Handle Enter key in chat input
        document.getElementById('chatInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadStats();
            loadSkills();
            loadPreferences();

            // Refresh stats every 10 seconds
            setInterval(loadStats, 10000);
        });
    </script>
</body>
</html>
