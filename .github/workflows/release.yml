name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version tag (e.g. v1.2.3)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  create-tag:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Validate version input
      run: |
        if ! echo "${{ github.event.inputs.version }}" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
          echo "Error: version '${{ github.event.inputs.version }}' must start with 'v' followed by a semver number (e.g. v1.2.3)"
          exit 1
        fi

    - name: Create and push tag
      run: |
        VERSION="${{ github.event.inputs.version }}"
        if git ls-remote --tags origin | grep -q "refs/tags/${VERSION}$"; then
          echo "Error: tag ${VERSION} already exists in the remote"
          exit 1
        fi
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag -a "${VERSION}" -m "Release ${VERSION}"
        git push origin "${VERSION}"

  build-and-release:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build
      run: npm run build

    - name: Create release package
      run: |
        mkdir -p release
        cp -r dist release/
        cp package.json package-lock.json release/
        cp .env.example release/.env.example
        cp README.md release/
        cd release && tar -czf ../mr-robot-${GITHUB_REF_NAME}.tar.gz .
        cd .. && zip -r mr-robot-${GITHUB_REF_NAME}.zip release/

    - name: Extract release notes
      id: extract_notes
      run: |
        VERSION=${GITHUB_REF_NAME}
        echo "version=${VERSION}" >> $GITHUB_OUTPUT

        # Create basic release notes
        cat > release_notes.md << 'EOF'
        ## What's New

        Release ${VERSION} of Mr. Robot - Your Personal AI Assistant

        ### Installation

        **Docker (Recommended):**
        ```bash
        docker pull ghcr.io/matheus-rech/mr-robot:${VERSION}
        docker-compose up -d
        ```

        **Manual Installation:**
        1. Download and extract the archive
        2. Run `npm install --production`
        3. Copy `.env.example` to `.env` and configure
        4. Run `npm start`

        **From Source:**
        ```bash
        npm install
        npm run build
        npm start
        ```

        ### Features
        - Multi-channel support (Terminal, Telegram, Discord, Slack, WhatsApp)
        - Dynamic skills system
        - Persistent memory with SQLite
        - Web search and fetch tools
        - Task scheduler with cron support
        - Voice capabilities (TTS)
        - HTTP health check endpoint

        ### System Requirements
        - Node.js 20.x or higher
        - Linux, macOS, or Windows
        - ARM64 support (Raspberry Pi compatible)

        See [README.md](https://github.com/matheus-rech/mr-robot/blob/main/README.md) for full documentation.
        EOF

        # Replace version placeholder
        sed "s/\${VERSION}/${VERSION}/g" release_notes.md > final_notes.md

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        body_path: final_notes.md
        files: |
          mr-robot-${{ github.ref_name }}.tar.gz
          mr-robot-${{ github.ref_name }}.zip
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-docker:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: build-and-release

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/${{ github.repository }}
        tags: |
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
